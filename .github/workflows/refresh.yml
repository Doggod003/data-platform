name: Monthly Refresh

on:
  schedule:
    - cron: "0 12 1 * *"   # 1st of each month, 12:00 UTC
  workflow_dispatch:        # allows manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e .
      - name: Cache data/processed
        uses: actions/cache@v4
        if: always()
        with:
          path: data/processed
          key: data-cache-${{ github.run_id }}
          restore-keys: |
            data-cache-
      - name: Run pipeline
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: python -m data_platform.pipelines.housing
      - name: Stage site
        run: |
          mkdir -p site/charts
          cp reports/pa_housing_dashboard.html site/index.html
          cp reports/pa_housing_monthly.csv reports/pa_housing_summary.csv site/
          cp reports/charts/*.png site/charts/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
